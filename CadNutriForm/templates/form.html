<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário com Máscara de CPF</title>
    <link rel="stylesheet" href="{{ url_for('static', filename= 'form.css') }}">
</head>
<body>
    <h1>Formulário de Cadastro</h1>
    <form id="cadastroForm">
        <div id="campoNome">
            <label for="nome">Nome Completo:</label>
            <input type="text" id="nome" name="nome" required>
        </div>

        <div id="campoCPF">
            <label for="cpf">CPF:</label>
            <input type="text" id="cpf" name="cpf" maxlength="14" placeholder="000.000.000-00" required>
        </div>

        <div id="campoDataNascimento">
            <label for="dataNascimento">Data de Nascimento:</label>
            <input type="date" id="dataNascimento" name="dataNascimento" required>
        </div>

        <div id="campoEmail">
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" required>
        </div>

        <div id="campoEscolaridade">
            <label for="escolaridade">Escolaridade:</label>
            <select id="escolaridade" name="escolaridade" required>
                <option value="">Selecione...</option>
                <option value="fundamental-incompleto">Fundamental Incompleto</option>
                <option value="fundamental-completo">Fundamental Completo</option>
                <option value="medio-incompleto">Médio Incompleto</option>
                <option value="medio-completo">Médio Completo</option>
                <option value="superior-incompleto">Superior Incompleto</option>
                <option value="superior-completo">Superior Completo</option>
                <option value="pos-graduacao">Pós-graduação</option>
            </select>
        </div>

        <div id="campoRaca">
            <label for="raca">Raça/Cor (IBGE):</label>
            <select id="raca" name="raca" required>
                <option value="">Selecione...</option>
                <option value="branca">Branca</option>
                <option value="preta">Preta</option>
                <option value="parda">Parda</option>
                <option value="amarela">Amarela</option>
                <option value="indigena">Indígena</option>
            </select>
        </div>

        <div id="campoEtnia">
            <label for="etnia">Etnia:</label>
            <select id="etnia" name="etnia" onchange="toggleOutraEtnia()" required>
                <option value="">Selecione...</option>
                <option value="latino">Latino-americano</option>
                <option value="arabe">Árabe</option>
                <option value="asiatico">Asiático Oriental</option>
                <option value="outro">Outro</option>
            </select>
        </div>

        <div id="campoOutraEtnia" style="display: none;">
            <label for="especificarEtnia">Por favor, especifique sua etnia:</label>
            <input type="text" id="especificarEtnia" name="especificarEtnia">
        </div>

        <div id="campoSexo">
            <label>Sexo:</label>
            <div class="horizontal" id="sexo-options">
              <div class="horizontal">
                <input type="radio" id="masculino" name="sexo" value="masculino" required>
                <label for="masculino">Masculino</label>
              </div class="horizontal">
              <div class="horizontal">
                <input type="radio" id="feminino" name="sexo" value="feminino">
                <label for="feminino">Feminino</label>
              </div class="horizontal">
            </div>
        </div>

        <button type="submit" style="margin-top: 20px;">Enviar Cadastro</button>
    </form>

    <script>
        // --- Lógica da Máscara de CPF ---
        const inputCPF = document.getElementById('cpf');

        inputCPF.addEventListener('input', (e) => {
            let value = e.target.value;
            
            // Remove tudo que não for número
            value = value.replace(/\D/g, "");

            // Aplica a formatação progressivamente
            if (value.length <= 11) {
                value = value.replace(/(\d{3})(\d)/, "$1.$2");
                value = value.replace(/(\d{3})(\d)/, "$1.$2");
                value = value.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            }

            e.target.value = value;
        });

        // --- Lógica da Etnia ---
        function toggleOutraEtnia() {
            const selectEtnia = document.getElementById('etnia');
            const campoOutro = document.getElementById('campoOutraEtnia');
            const inputOutro = document.getElementById('especificarEtnia');

            if (selectEtnia.value === 'outro') {
                campoOutro.style.display = 'flex';
                inputOutro.setAttribute('required', 'required');
            } else {
                campoOutro.style.display = 'none';
                inputOutro.removeAttribute('required');
                inputOutro.value = '';
            }
        }

        // Submissão
        document.getElementById('cadastroForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const formData = new FormData(this);
            console.log("Dados:", Object.fromEntries(formData.entries()));
            alert("Sucesso!");
        });
    </script>

</body>
</html>
