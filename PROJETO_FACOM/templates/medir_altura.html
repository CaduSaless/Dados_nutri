<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename= 'style.css') }}">
    <style>
        .controls {
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        #connect-btn {
            padding: 12px 25px;
            background: linear-gradient(135deg, #DB6725, #DB6725);
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 1.2rem;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(255, 255, 255, 0.1);
        }
        #connect-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 8px rgba(255, 255, 255, 0.15);
            background: linear-gradient(135deg, #DB6725, #DB6725);
        }
        #connect-btn:active {
            transform: translateY(0);
        }
        /* Aumentar o tamanho do texto 'cm' */
        .distance-value .unit {
            font-size: 2.5rem;
            color: #7f8c8d;
            margin-left: 10px;
            vertical-align: middle;
        }
    </style>
    <title>Medição de Altura</title>
</head>
<body>
    <div class="container">
        <h1>Medição de Altura</h1>
        <div class="status">
            <div class="status-indicator"></div>
            <span id="status-text">Desconectado</span>
        </div>
        <div class="display">
            <h2>Altura Atual</h2>
            <div class="distance-value"><span id="distance">--</span><span class="unit">cm</span></div>
        </div>
        <div class="controls">
            <button id="connect-btn">Conectar ao Sensor</button>
        </div>
        <div class="info">
            <p>Conecte-se via Bluetooth para receber a altura em tempo real.</p>
        </div>
    </div>
    <form id="alturaForm" action="/dados/altura_verif" method="post" style="display:none;">
        <input type="hidden" name="altura" id="alturaInput">
    </form>
    <script>
        let connected = false;
        const connectBtn = document.getElementById('connect-btn');
        const distanceElement = document.getElementById('distance');
        const statusText = document.getElementById('status-text');
        const statusIndicator = document.querySelector('.status-indicator');
        const statusContainer = document.querySelector('.status');
        const alturaInput = document.getElementById('alturaInput');
        const alturaForm = document.getElementById('alturaForm');
        let alturaEnviada = false;

        function updateStatus(isConnected) {
            connected = isConnected;
            if (connected) {
                statusText.textContent = 'Conectado';
                statusContainer.classList.add('connected');
                connectBtn.textContent = 'Desconectar';
            } else {
                statusText.textContent = 'Desconectado';
                statusContainer.classList.remove('connected');
                connectBtn.textContent = 'Conectar ao Sensor';
            }
        }

        function updateDistance(value) {
            distanceElement.textContent = value;
            // Quando receber valor válido, envia para o backend
            if (!alturaEnviada && value > 0) {
                alturaInput.value = value;
                alturaEnviada = true;
                alturaForm.submit();
            }
        }

        function connect() {
            if (connected) {
                updateStatus(false);
                return;
            }
            navigator.bluetooth.requestDevice({
                filters: [{ name: 'ESP32-LIDAR' }],
                optionalServices: ['19b10000-e8f2-537e-4f6c-d104768a1214']
            })
            .then(device => device.gatt.connect())
            .then(server => server.getPrimaryService('19b10000-e8f2-537e-4f6c-d104768a1214'))
            .then(service => service.getCharacteristic('19b10001-e8f2-537e-4f6c-d104768a1214'))
            .then(characteristic => {
                updateStatus(true);
                characteristic.addEventListener('characteristicvaluechanged', handleData);
                return characteristic.startNotifications();
            })
            .catch(error => {
                alert('Falha na conexão. Verifique se o dispositivo está disponível.');
            });
        }

        function handleData(event) {
            let value = new TextDecoder().decode(event.target.value);
            try {
                let data = JSON.parse(value);
                updateDistance(data.distance);
            } catch (e) {
                // Se não for JSON, tenta converter direto
                let num = parseFloat(value);
                if (!isNaN(num)) updateDistance(num);
            }
        }

        connectBtn.addEventListener('click', connect);

        window.onload = function() {
            if (!navigator.bluetooth) {
                alert('Seu navegador não suporta Web Bluetooth. Tente usar Chrome ou Edge.');
                connectBtn.disabled = true;
            }
        };
    </script>
</body>
</html>
